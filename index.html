<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Titolo e descrizione -->
    <title>Eventi CNA</title>
    <meta name="description" content="Portale gestione eventi CNA Roma" />
    <meta name="application-name" content="Eventi CNA" />

    <!-- Favicon browser -->
    <link rel="icon" type="image/x-icon"   href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml"  href="/icon.svg" />

    <!-- Apple (salvataggio su iPhone/iPad) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eventi CNA" />

    <!-- PWA manifest (Android + Chrome) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#003DA5" />

    <!-- Windows tile -->
    <meta name="msapplication-TileImage" content="/icon-144.png" />
    <meta name="msapplication-TileColor" content="#003DA5" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Eventi CNA" />
    <meta property="og:description" content="Portale gestione eventi CNA Roma" />
    <meta property="og:image"       content="/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Self-heal eseguito PRIMA di qualsiasi bundle JS, indipendente da
      // React/Vite. Se questo file HTML viene servito da una cache vecchia
      // (SW corrotto, cache Safari aggressiva), questo script gira comunque
      // perché è inline qui dentro, non in un file .js separato che potrebbe
      // essere a sua volta cachato. Confronta una versione salvata in
      // localStorage con BUILD_STAMP: se diversa, pulisce tutto e ricarica
      // UNA sola volta prima di montare l'app React.
      (function () {
        var BUILD_STAMP = '2026-06-30-fix-css-conflict-v2';
        try {
          var saved = localStorage.getItem('cna-build-stamp');
          if (saved === BUILD_STAMP) return;

          var cleanup = [];
          if ('caches' in window) {
            cleanup.push(
              caches.keys().then(function (names) {
                return Promise.all(names.map(function (n) { return caches.delete(n); }));
              })
            );
          }
          if ('serviceWorker' in navigator) {
            cleanup.push(
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              })
            );
          }
          Promise.all(cleanup).finally(function () {
            localStorage.setItem('cna-build-stamp', BUILD_STAMP);
            if (saved) {
              // C'era una versione precedente diversa: ricarica per
              // garantire che il bundle JS fresco venga scaricato.
              window.location.reload();
            }
          });
        } catch (e) {
          // Ambiente senza supporto storage/cache: nessun self-heal possibile,
          // ma l'app prosegue comunque a caricarsi normalmente.
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
